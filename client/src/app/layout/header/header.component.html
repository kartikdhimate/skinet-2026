<header class="shadow-md p-3 w-full">
    <!-- Header component: original class was max-w-screen-2xl, but that is not available, so used max-w-2xl.
     But that is very short screen size.-->
    <div class="flex align-middle items-center justify-between max-w-full mx-auto">
        <img routerLink="/" src="/images/logo.png" alt="Logo" class="max-h-16"/>
        <nav class="flex gap-3 my-2 uppercase text-2xl">
            <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
            <a routerLink="/shop" routerLinkActive="active">Shop</a>
            <a>Contact</a>
        </nav>
        <div class="flex gap-3 align-middle">
            <a matBadge="5" matBadgeSize="large" class="custom-badge mt-2 mr-2">
                <mat-icon>shopping_cart</mat-icon>
            </a>
            <button mat-stroked-button>Login</button>
            <button mat-stroked-button>Register</button>
        </div>
    </div>
</header>
