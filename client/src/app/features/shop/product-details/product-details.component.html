@if(product(); as product){
    <section class="py-8">
        <!-- Original class used here was: max-w-2xl -->
        <div class="max-w-4xl px-4 mx-auto">
            <div class="grid grid-cols-2 gap-8">
                <div class="max-w-xl mx-auto">
                    <img class="w-full" src="{{product.pictureUrl}}" alt="product image">
                </div>

                <div>
                    <h1 class="text-2xl font-semibold text-gray-900">{{product.name}}</h1>

                    <p>You have {{quantityInCart}} of this item in your cart.</p>

                    <div class="mt-4 items-center gap-4 flex">
                        <p class="text-3xl font-extrabold text-gray-900">{{product.price | currency}}</p>
                    </div>

                    <div class="flex gap-4 mt-6">
                        <button mat-flat-button class="min-h-14" (click)="updateCart()" [disabled]="quantity === quantityInCart">
                            <mat-icon>shopping_cart</mat-icon>
                            {{getButtonText()}}
                        </button>

                        <mat-form-field appearance="outline" class="flex">
                            <mat-label>Quantity</mat-label>
                            <input matInput type="number" [(ngModel)]="quantity" min="0">
                        </mat-form-field>
                    </div>

                    <mat-divider></mat-divider>

                    <p class="mt-6 text-gray-500">{{product?.description}}</p>
                </div>
            </div>
        </div>
    </section>
}
